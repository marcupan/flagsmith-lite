services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: flagr
      POSTGRES_USER: flagr
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flagr -d flagr"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    ports: ["3000:3000"]
    environment:
      - DATABASE_URL=postgres://flagr:password@db:5432/flagr
      - REDIS_URL=redis://cache:6379
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes: ["./apps/api:/app/apps/api", "./packages/shared:/app/packages/shared"]

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports: ["5173:5173"]
    environment:
      # Browser fetches directly from host — use localhost, not service name
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - api
    volumes: ["./apps/web:/app/apps/web", "./packages/shared:/app/packages/shared"]
