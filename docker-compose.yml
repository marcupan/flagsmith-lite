services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: flagr
      POSTGRES_USER: flagr
      POSTGRES_PASSWORD: password
    ports: ["${DB_PORT:-5433}:5432"]
    networks: [app]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flagr -d flagr"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7
    ports: ["${REDIS_PORT:-6379}:6379"]
    networks: [app]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    ports: ["${API_PORT:-3000}:3000"]
    networks: [app]
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL:-postgres://flagr:password@db:5432/flagr}
      - REDIS_URL=${REDIS_URL:-redis://cache:6379}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - API_KEY=${API_KEY:-local-dev-key}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3000/health'').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports: ["5173:5173"]
    networks: [app]
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_API_KEY=local-dev-key
    depends_on:
      api:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:latest
    ports:
      # Bind to loopback only — n8n has code execution; never expose to 0.0.0.0
      - "127.0.0.1:5678:5678"
    networks: [app]
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      # N8N_USER and N8N_PASSWORD must be set in .env — no insecure defaults
      - N8N_BASIC_AUTH_USER=${N8N_USER:?N8N_USER must be set in .env}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?N8N_PASSWORD must be set in .env}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
    depends_on:
      api:
        condition: service_healthy

networks:
  app:
    driver: bridge

volumes:
  n8n_data:
