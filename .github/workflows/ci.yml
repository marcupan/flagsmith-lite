name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Static checks: fast, no services needed ─────────────────────────────
  verify:
    name: Verify (format · types · build · docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Docs link check
        run: pnpm docs:check-links

  # ── Integration tests: require Postgres ────────────────────────────────
  test:
    name: Test (API integration)
    runs-on: ubuntu-latest
    needs: verify

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: flagr
          POSTGRES_USER: flagr
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run API tests
        run: pnpm --filter @project/api test
        env:
          DATABASE_URL: postgres://flagr:password@localhost:5432/flagr
          REDIS_URL: ""
          API_KEY: test-api-key

  # ── Docker smoke: validate containerized runtime ────────────────────────
  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t flagr-api:ci .

      - name: Start services
        run: docker compose up -d db cache
        env:
          COMPOSE_FILE: docker-compose.yml
          COMPOSE_PROJECT_NAME: flagsmith-lite
          N8N_USER: ci-placeholder
          N8N_PASSWORD: ci-placeholder

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 20); do
            docker compose exec -T db pg_isready -U flagr && break
            sleep 2
          done
        env:
          N8N_USER: ci-placeholder
          N8N_PASSWORD: ci-placeholder

      - name: Start API container
        run: |
          docker run -d \
            --name flagr-api-smoke \
            --network flagsmith-lite_app \
            -e DATABASE_URL=postgres://flagr:password@db:5432/flagr \
            -e REDIS_URL=redis://cache:6379 \
            -e API_KEY=smoke-test-key \
            -p 3000:3000 \
            flagr-api:ci

      - name: Wait for API health
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/health && break
            sleep 2
          done

      - name: Smoke test
        run: node scripts/smoke-health.mjs http://localhost:3000/health

      - name: Cleanup
        if: always()
        run: docker compose down -v && docker rm -f flagr-api-smoke || true
        env:
          COMPOSE_PROJECT_NAME: flagsmith-lite
          N8N_USER: ci-placeholder
          N8N_PASSWORD: ci-placeholder
